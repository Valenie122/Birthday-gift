<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #ffe4ec, #fff0f5);
  text-align: center;
  overflow-x: hidden;
}

/* Title */
h1 {
  color: #ff6f91;
}

/* Envelope */
.envelope-wrapper {
  position: relative;
  margin-top: 40px;
}

.envelope {
  width: 220px;
  height: 140px;
  margin: auto;
  position: relative;
  cursor: pointer;
}

.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #ffb6c1;
  clip-path: polygon(0 0, 100% 0, 50% 60%);
  transform-origin: top;
  transition: 0.8s ease;
  z-index: 3;
}

.body {
  background: #ffc0cb;
  width: 100%;
  height: 100%;
  border-radius: 5px;
}

.envelope.open .flap {
  transform: rotateX(-180deg);
}

/* Letter sliding */
.letter {
  width: 85%;
  max-width: 700px;
  margin: auto;
  background: white;
  border-radius: 12px;
  padding: 20px;
  text-align: left;
  white-space: pre-wrap;

  transform: translateY(-200px);
  opacity: 0;
  transition: 1s ease;
}

.letter.show {
  transform: translateY(20px);
  opacity: 1;
}

/* Floating petals */
.petal {
  position: fixed;
  top: -20px;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
  }
}

/* Fireworks */
.firework {
  position: fixed;
  width: 5px;
  height: 5px;
  background: pink;
  border-radius: 50%;
  animation: explode 1s ease-out forwards;
}

@keyframes explode {
  to {
    transform: scale(10);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div class="envelope-wrapper">

    <div class="body"></div>
  </div>
</div>

<div id="letter" class="letter"></div>

<audio autoplay loop>
  <source src="https://files.catbox.moe/kkw9ns.mp3" type="audio/mpeg">
</audio>

let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("letter").innerHTML += text.charAt(i);

  }
}

function openLetter(el) {
  el.classList.toggle("open");

  let letter = document.getElementById("letter");
  letter.classList.add("show");

  if (letter.innerHTML === "") {
    typeWriter();
    document.getElementById("music").play();
    launchFireworks();

/* petals */
setInterval(() => {
  let petal = document.createElement("div");
  petal.className = "petal";
  petal.innerHTML = Math.random() > 0.5 ? "🌻" : "🌷";
  petal.style.left = Math.random() * 100 + "vw";
  petal.style.animationDuration = (Math.random() * 3 + 3) + "s";
  document.body.appendChild(petal);

  setTimeout(() => petal.remove(), 6000);
}, 300);

/* fireworks */
function launchFireworks() {
  for (let i = 0; i < 20; i++) {
    let fw = document.createElement("div");
    fw.className = "firework";
    fw.style.left = Math.random() * 100 + "vw";

</script>

</body>
</html>
